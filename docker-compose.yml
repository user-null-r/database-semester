services:
  db:
    image: postgres:17
    container_name: pg-course-db
    environment:
      POSTGRES_DB: Deanery
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
      TZ: Europe/Moscow
    ports:
      - "55432:5432"
    volumes:
      - pg_course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d Deanery"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  flyway:
    image: flyway/flyway:10
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy
    command: -connectRetries=60 migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/Deanery
      FLYWAY_USER: admin
      FLYWAY_PASSWORD: admin_pass
      FLYWAY_DEFAULT_SCHEMA: public
    volumes:
      - ./s2/db/migrations:/flyway/sql:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: pg-course-exporter
    profiles:
      - monitoring
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://admin:admin_pass@db:5432/Deanery?sslmode=disable
    ports:
      - "9187:9187"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pg-course-prometheus
    profiles:
      - monitoring
    depends_on:
      - postgres-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pg-course-grafana
    profiles:
      - monitoring
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  pg_course_data:
  prometheus_data:
  grafana_data:
